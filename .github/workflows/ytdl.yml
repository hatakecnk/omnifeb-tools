name: ytdl

on:
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube URL"
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm
          pip install yt-dlp

      - name: Get video info
        run: |
          yt-dlp --js-runtimes node -j "${{ github.event.inputs.url }}" > result.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.json