<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OmniFeb Tools</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#020617;
padding:30px;
border-radius:10px;
width:420px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-bottom:12px;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
text-align:left;
background:#020617;
padding:12px;
border-radius:6px;
}

a.download{
display:inline-block;
margin-top:10px;
padding:10px 14px;
background:#22c55e;
color:white;
text-decoration:none;
border-radius:6px;
}

.loading{
margin-top:10px;
font-size:14px;
opacity:0.8;
}
</style>

</head>

<body>

<div class="container">

<h1>OmniFeb Tools</h1>

<input id="url" placeholder="Paste YouTube URL">

<button onclick="downloadVideo()">Get Video</button>

<div id="status" class="loading"></div>

<div id="result" class="result"></div>

</div>

<script>

async function downloadVideo(){

const url=document.getElementById("url").value
const status=document.getElementById("status")
const result=document.getElementById("result")

if(!url){
status.innerText="Please enter a URL"
return
}

status.innerText="Fetching video..."
result.innerHTML=""

try{

const res=await fetch("/api/ytdl?url="+encodeURIComponent(url))
const data=await res.json()

if(data.error){
status.innerText="Error: "+data.error
return
}

status.innerText=""

result.innerHTML=
"<b>Title:</b> "+data.title+
"<br><a class='download' href='"+data.download+"' target='_blank'>Download Video</a>"

}catch(e){

status.innerText="Failed to fetch video"

}

}

</script>

</body>
</html>
