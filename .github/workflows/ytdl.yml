name: yt-dlp

on:
workflow_dispatch:
inputs:
url:
description: "YouTube URL"
required: true

jobs:
run:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - name: Install yt-dlp
    run: pip install yt-dlp

  - name: Get video info
    run: yt-dlp -j "${{ github.event.inputs.url }}" > result.json

  - name: Upload result
    uses: actions/upload-artifact@v4
    with:
      name: result
      path: result.json
```
